      - {id: 612,  slug: "price_ida_s1",      name: "Precio Intradiario Sesión 1"}
      - {id: 613,  slug: "price_ida_s2",      name: "Precio Intradiario Sesión 2"}
      - {id: 614,  slug: "price_ida_s3",      name: "Precio Intradiario Sesión 3"}
      - {id: 615,  slug: "price_ida_s4",      name: "Precio Intradiario Sesión 4"}
      - {id: 616,  slug: "price_ida_s5",      name: "Precio Intradiario Sesión 5"}
      - {id: 617,  slug: "price_ida_s6",      name: "Precio Intradiario Sesión 6"}
      - {id: 618,  slug: "price_ida_s7",      name: "Precio Intradiario Sesión 7"}
