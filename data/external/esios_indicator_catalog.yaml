# ESIOS /indicators curated catalog for the MTU15 / ISP15 thesis.
#
# 109 indicators across 4 priority tiers, intended as a backfill 2018-01-01 → today
# via scripts/pipelines/esios/00_download_indicator.py.
#
# Source: 2,018-indicator catalog at https://api.esios.ree.es/indicators (token required).
# Catalog dump at /tmp/esios_catalog_full.json from 2026-05-15 exploration.
#
# Per the project plan (~/.claude/plans/dazzling-churning-seal.md), this YAML drives
# scripts/pipelines/esios/indicators/00_batch_sync.py.

version: 1
created: 2026-05-15

# Default ingestion parameters per indicator (can be overridden per-entry).
defaults:
  start_date: "2018-01-01"
  end_date: "today"
  time_trunc: "hour"

