      - {id: 808, slug: "pvpc_qh_mercado_intradiario",  name: "PVPC QH componente mercado intradiario"}
      - {id: 809, slug: "pvpc_qh_restricciones_ida",    name: "PVPC QH componente restricciones intradiario"}
      - {id: 810, slug: "pvpc_qh_rpa",                  name: "PVPC QH componente RPA"}
      - {id: 811, slug: "pvpc_qh_banda_secundaria",     name: "PVPC QH componente banda secundaria"}
      - {id: 812, slug: "pvpc_qh_desvios",              name: "PVPC QH componente desvíos"}
      - {id: 813, slug: "pvpc_qh_saldo_desvios",        name: "PVPC QH componente saldo desvíos"}
