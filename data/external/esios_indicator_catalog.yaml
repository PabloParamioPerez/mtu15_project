# ESIOS /indicators curated catalog for the MTU15 / ISP15 thesis.
#
# 109 indicators across 4 priority tiers, intended as a backfill 2018-01-01 → today
# via scripts/pipelines/esios/00_download_indicator.py.
#
# Source: 2,018-indicator catalog at https://api.esios.ree.es/indicators (token required).
# Catalog dump at /tmp/esios_catalog_full.json from 2026-05-15 exploration.
#
# Per the project plan (~/.claude/plans/dazzling-churning-seal.md), this YAML drives
# scripts/pipelines/esios/indicators/00_batch_sync.py.

version: 1
created: 2026-05-15

# Default ingestion parameters per indicator (can be overridden per-entry).
defaults:
  start_date: "2018-01-01"
  end_date: "today"
  time_trunc: "hour"

tiers:

  # =====================================================================
  # Tier A — controls and TTF/CO2 defense (25 indicators)
  # =====================================================================

  - name: "fuel_prices_ttf_co2_proxy"
    description: "REE reference fuel and CO2 prices (TNP context, proxy for TTF/EUA)"
    priority: A
    indicators:
      - {id: 1391, slug: "co2_pco2d",         name: "Precio derechos emisión CO2 (PCO2D)"}
      - {id: 1940, slug: "fuel_gas_natural",  name: "Precio Gas Natural TNP"}
      - {id: 1933, slug: "fuel_diesel_oil",   name: "Precio diesel oil TNP"}
      - {id: 1934, slug: "fuel_fuel_03",      name: "Precio fuel 0.3% TNP"}
      - {id: 1935, slug: "fuel_fuel_073",     name: "Precio fuel 0.73% TNP"}
      - {id: 1936, slug: "fuel_carbon",       name: "Precio carbón Baleares"}
      - {id: 1938, slug: "fuel_gasoleo",      name: "Precio gasoleo TNP"}
      - {id: 1939, slug: "fuel_fuel_1",       name: "Precio fuel 1% TNP"}

  - name: "renewable_forecasts"
    description: "Wind/solar forecast horizons for conditional parallel-trends controls"
    priority: A
    indicators:
      - {id: 541,   slug: "wind_forecast_pen",    name: "Previsión producción eólica peninsular"}
      - {id: 542,   slug: "solar_pv_forecast",    name: "Generación prevista Solar PV"}
      - {id: 543,   slug: "solar_thermal_forecast", name: "Generación prevista Solar térmica"}
      - {id: 1777,  slug: "wind_forecast_d1",     name: "Previsión D+1 eólica"}
      - {id: 1778,  slug: "wind_forecast_h3",     name: "Previsión intradiaria H+3 eólica"}
      - {id: 10034, slug: "solar_forecast_combined", name: "Generación prevista Solar combinada"}
      - {id: 10358, slug: "wind_pv_forecast_d1",  name: "Previsión D+1 eólica + PV"}
      - {id: 10359, slug: "wind_pv_forecast_h3",  name: "Previsión H+3 eólica + PV"}
      - {id: 10249, slug: "residual_demand_forecast", name: "Previsión demanda residual"}

  - name: "demand_actual_forecast"
    description: "Demand realised and forecast horizons"
    priority: A
    indicators:
      - {id: 460,   slug: "demand_forecast_daily_pen",  name: "Previsión diaria demanda peninsular"}
      - {id: 461,   slug: "demand_forecast_monthly_pen", name: "Previsión mensual demanda peninsular"}
      - {id: 544,   slug: "demand_forecast",            name: "Demanda prevista"}
      - {id: 603,   slug: "demand_forecast_weekly_pen", name: "Previsión semanal demanda peninsular"}
      - {id: 1192,  slug: "demand_barras_central",      name: "Demanda en barras de central"}
      - {id: 1293,  slug: "demand_real",                name: "Demanda real"}
      - {id: 1742,  slug: "demand_real_snp",            name: "Demanda Real SNP"}
      - {id: 1775,  slug: "demand_forecast_d1",         name: "Previsión D+1 demanda"}
      - {id: 1776,  slug: "demand_forecast_h3",         name: "Previsión intradiaria H+3 demanda"}
      - {id: 2052,  slug: "demand_real_forecast_nat",   name: "Demanda real prevista nacional"}

  # =====================================================================
  # Tier B — clearing prices and PVPC component decomposition (22)
  # =====================================================================

  - name: "market_clearing_prices_sanity"
    description: "DA + IDA session prices (sanity-check against OMIE; spot-pull only, not full backfill)"
    priority: B_spotcheck
