      - {id: 10149, slug: "demand_phf7_total", name: "Demanda programada PHF7 total"}
      - {id: 10279, slug: "demand_phfc_total", name: "Demanda programada PHFC total"}
      - {id: 10027, slug: "demand_p48_total",  name: "Demanda programada P48 total"}
